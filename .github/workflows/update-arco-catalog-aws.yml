name: Update AWS Catalog Metadata

on:
  workflow_dispatch:
  schedule:
    # Monday 10:00 Asia/Shanghai
    - cron: "0 2 * * 1"

permissions:
  contents: write

concurrency:
  group: update-arco-catalog-aws
  cancel-in-progress: false

jobs:
  update-aws-catalog:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --frozen

      - name: Refresh AWS EC2 catalog
        run: uv run scrape-ec2-catalog

      - name: Commit and push updated metadata
        run: |
          if git diff --quiet -- data/aws; then
            echo "No catalog changes detected."
            exit 0
          fi

          git status --short -- data/aws
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/aws
          git commit -m "chore(arco-catalog): refresh AWS catalog metadata"
          git push origin HEAD:${{ github.ref_name }}
