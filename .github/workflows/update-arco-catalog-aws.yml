name: Update AWS Catalog Metadata

on:
  workflow_dispatch:
  schedule:
    # Monday 10:00 Asia/Shanghai
    - cron: "0 2 * * 1"

permissions:
  contents: write

concurrency:
  group: update-arco-catalog-aws
  cancel-in-progress: false

jobs:
  update-aws-catalog:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --frozen

      - name: Refresh AWS EC2 catalog
        run: uv run scrape-ec2-catalog

      - name: Detect catalog changes
        id: changes
        shell: bash
        run: |
          status_output="$(git status --porcelain --untracked-files=all -- data/aws)"
          if [ -z "$status_output" ]; then
            echo "changed=false" >>"${GITHUB_OUTPUT}"
            echo "No catalog changes detected."
          else
            echo "changed=true" >>"${GITHUB_OUTPUT}"
            printf '%s\n' "$status_output"
          fi

      - name: Create local commit for updated metadata
        if: steps.changes.outputs.changed == 'true'
        id: commit
        shell: bash
        run: |
          git status --short -- data/aws
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/aws
          git commit -m "chore(arco-catalog): refresh AWS catalog metadata"
          commit_sha="$(git rev-parse HEAD)"
          echo "commit_sha=$commit_sha" >>"${GITHUB_OUTPUT}"

      - name: Publish AWS dataset to registry
        if: steps.changes.outputs.changed == 'true'
        env:
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_REGION: ${{ secrets.S3_REGION }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          ARCO_REGISTRY_BASE_URL: https://registry.arcoloom.com
        run: |
          uv run python scripts/publish_registry_dataset.py \
            --version "${{ steps.commit.outputs.commit_sha }}" \
            --channel latest \
            --channel stable

      - name: Push committed metadata
        if: steps.changes.outputs.changed == 'true'
        shell: bash
        run: |
          commit_sha="${{ steps.commit.outputs.commit_sha }}"
          git push origin "HEAD:${{ github.ref_name }}"
          git fetch origin "${{ github.ref_name }}" --depth=1
          remote_sha="$(git rev-parse "origin/${{ github.ref_name }}")"
          if [ "$remote_sha" != "$commit_sha" ]; then
            echo "Expected remote ${GITHUB_REF_NAME} to be $commit_sha, got $remote_sha" >&2
            exit 1
          fi
