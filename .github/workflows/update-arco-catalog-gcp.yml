name: Update GCP Catalog Metadata

on:
  workflow_dispatch:
  schedule:
    # Thursday 10:00 Asia/Shanghai
    - cron: "0 2 * * 4"

permissions:
  contents: write

concurrency:
  group: update-arco-catalog-gcp
  cancel-in-progress: false

jobs:
  update-gcp-catalog:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Refresh GCP catalog
        run: uv run scrape-gcp-catalog

      - name: Detect catalog changes
        id: changes
        shell: bash
        run: |
          status_output="$(git status --porcelain --untracked-files=all -- data/gcp)"
          if [ -z "$status_output" ]; then
            echo "changed=false" >>"${GITHUB_OUTPUT}"
            echo "No catalog changes detected."
          else
            echo "changed=true" >>"${GITHUB_OUTPUT}"
            printf '%s\n' "$status_output"
          fi

      - name: Commit and push updated metadata
        if: steps.changes.outputs.changed == 'true'
        id: commit
        shell: bash
        run: |
          git status --short -- data/gcp
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/gcp
          git commit -m "chore(arco-catalog): refresh GCP catalog metadata"
          commit_sha="$(git rev-parse HEAD)"
          git push origin "HEAD:${{ github.ref_name }}"
          git fetch origin "${{ github.ref_name }}" --depth=1
          remote_sha="$(git rev-parse "origin/${{ github.ref_name }}")"
          if [ "$remote_sha" != "$commit_sha" ]; then
            echo "Expected remote ${GITHUB_REF_NAME} to be $commit_sha, got $remote_sha" >&2
            exit 1
          fi
          echo "commit_sha=$commit_sha" >>"${GITHUB_OUTPUT}"

      - name: Publish GCP dataset to registry
        if: steps.changes.outputs.changed == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ARCO_REGISTRY_BASE_URL: https://registry.arcoloom.com
          ARCO_REGISTRY_BUCKET: arco-registry
        run: |
          python scripts/publish_registry_dataset.py \
            --provider gcp \
            --dataset compute \
            --dataset-dir data/gcp \
            --version "${{ steps.commit.outputs.commit_sha }}" \
            --channel latest \
            --channel stable
