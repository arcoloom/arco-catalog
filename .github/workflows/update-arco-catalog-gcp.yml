name: Update GCP Catalog Metadata

on:
  workflow_dispatch:
  schedule:
    # Thursday 10:00 Asia/Shanghai
    - cron: "0 2 * * 4"

permissions:
  contents: write

concurrency:
  group: update-arco-catalog-gcp
  cancel-in-progress: false

jobs:
  update-gcp-catalog:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Refresh GCP catalog
        run: uv run scrape-gcp-catalog

      - name: Detect catalog changes
        id: changes
        shell: bash
        run: |
          if git diff --quiet -- data/gcp; then
            echo "changed=false" >>"${GITHUB_OUTPUT}"
            echo "No catalog changes detected."
          else
            echo "changed=true" >>"${GITHUB_OUTPUT}"
          fi

      - name: Commit and push updated metadata
        if: steps.changes.outputs.changed == 'true'
        run: |
          git status --short -- data/gcp
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/gcp
          git commit -m "chore(arco-catalog): refresh GCP catalog metadata"
          git push origin HEAD:${{ github.ref_name }}

      - name: Publish GCP dataset to registry
        if: steps.changes.outputs.changed == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ARCO_REGISTRY_BASE_URL: https://registry.arcoloom.com
          ARCO_REGISTRY_BUCKET: arco-registry
        run: |
          python scripts/publish_registry_dataset.py \
            --provider gcp \
            --dataset compute \
            --dataset-dir data/gcp \
            --version "$(git rev-parse HEAD)" \
            --channel latest \
            --channel stable
